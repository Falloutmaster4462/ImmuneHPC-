# ansible/inventory.ini — ImmuneHPC+ node inventory
# Keep this in sync with config/production.yaml cluster.nodes

[hpc_nodes]
node01.cluster.local
node02.cluster.local
node03.cluster.local
# Add more nodes here

[hpc_nodes:vars]
ansible_user=root
ansible_ssh_private_key_file=/etc/immunehpc/id_ed25519
ansible_ssh_common_args=-o StrictHostKeyChecking=no

[controller]
localhost ansible_connection=local
